name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bun run typecheck

      - run: bun test

      - name: Audit dependencies
        run: bun audit --audit-level=high

      - name: Lint
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - run: biome ci .

      - name: Verify npm pack
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.out
          if grep -q 'npm warn' /tmp/pack.out; then
            echo "::error::npm pack produced warnings"
            exit 1
          fi

  integration-test:
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bun install -g opencode-ai@latest

      - run: INTEGRATION=1 bun test test/

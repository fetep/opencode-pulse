name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bun run typecheck

      - run: bun test

      - name: Lint
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - run: biome ci .

      - name: Verify npm pack
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.out
          if grep -q 'npm warn' /tmp/pack.out; then
            echo "::error::npm pack produced warnings"
            exit 1
          fi

      - name: Bump version
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Generate changelog
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          {
            echo "## v${VERSION} (${DATE})"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges
            else
              git log --pretty=format:"- %s" --no-merges
            fi
            echo ""
          } > /tmp/release-notes.md

          if [ -f CHANGELOG.md ]; then
            { cat /tmp/release-notes.md; echo ""; cat CHANGELOG.md; } > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          else
            { echo "# Changelog"; echo ""; cat /tmp/release-notes.md; } > CHANGELOG.md
          fi

      - name: Commit, tag, and push
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags

      - name: Publish to npm
        run: npm publish --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md
